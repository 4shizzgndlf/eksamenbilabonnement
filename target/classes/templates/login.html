<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log in</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
    <script th:src="@{js/script.js}" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sekuya&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
          rel="stylesheet">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar"></div>
<div class="page">
    <div class="pageContainer">
        <div class="auth-wrapper">
            <div class="auth-card">

                <form method="post" action="/login">
                    <h2>Log ind</h2>

                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Adgangskode" required>

                    <button type="submit">Log ind</button>
                </form>

                <div class="auth-footer">
                    Har du ikke en konto?
                    <a href="/registrer">Registrer</a>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
