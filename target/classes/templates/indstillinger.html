<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indstillinger</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
    <script th:src="@{js/script.js}" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sekuya&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
          rel="stylesheet">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar"></div>
<div class="page">
    <div class="pageContainer">
        <h1>Indstillinger</h1>
        <div class="glass-card">
            <h2>Sidebar Farve</h2>

            <div class="theme-options">
                <label>
                    <input type="radio" name="sidebarTheme"
                           value="rgba(0, 0, 0, 0.85)" checked>
                    Original
                </label>

                <label>
                    <input type="radio" name="sidebarTheme" value="#000000" checked>
                    Sort
                </label>

                <label>
                    <input type="radio" name="sidebarTheme" value="#D3D3D3">
                    Lysegrå
                </label>

                <label>
                    <input type="radio" name="sidebarTheme" value="#a855f7">
                    Mørk lilla
                </label>

                <label>
                    <input type="radio" name="sidebarTheme" value="#22c55e">
                    Grøn
                </label>

                <label>
                    <input type="radio" name="sidebarTheme" value="#ef4444">
                    Rød
                </label>
            </div>
        </div>
    </div>
</div>
</body>
</html>
