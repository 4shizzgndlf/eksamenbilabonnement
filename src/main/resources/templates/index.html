<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hjem</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
    <script th:src="@{js/script.js}" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sekuya&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
          rel="stylesheet">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar"></div>
<div class="page">
    <div class="pageContainer">
        <div class="home-wrapper">

            <div class="home-card">

                <h1>Velkommen 👋</h1>

                <p th:if="${session.user != null}">
                    Du er logget ind som <strong th:text="${session.user.firstName}"></strong>
                </p>

                <p th:if="${session.user == null}">
                    Log ind eller opret en konto for at komme i gang med bilabonnement.
                </p>

                <div class="home-actions">

                    <!-- NOT LOGGED IN -->
                    <a th:if="${session.user == null}" href="/login">Log ind</a>
                    <a th:if="${session.user == null}" href="/register">Registrer</a>

                    <!-- LOGGED IN -->
                    <a th:if="${session.user != null}" href="/profil">Min profil</a>
                    <a th:if="${session.user != null}" href="/biler">Se biler</a>
                    <a th:if="${session.user != null}" href="/lejeaftaler">Lejeaftaler</a>

                    <!-- ADMIN ONLY -->
                    <a th:if="${session.user != null and session.user.role == 'Admin'}"
                       href="/dashboard">Dashboard</a>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
