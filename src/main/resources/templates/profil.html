<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
    <script th:src="@{js/script.js}" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sekuya&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
          rel="stylesheet">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar"></div>
<div class="page">
    <div class="pageContainer">
        <h1>Profil</h1>
        <div class="profil-wrapper">
            <div class="glass-card">
                <h2>Profil</h2>

                <form action="/profil/opdater" method="post" class="card-form">

                    <input type="hidden" name="id" th:value="${user.id}"/>

                    <input type="text" name="firstName"
                           placeholder="Fornavn"
                           th:value="${user.firstName}" required/>

                    <input type="text" name="lastName"
                           placeholder="Efternavn"
                           th:value="${user.lastName}" required/>

                    <input type="email" name="email"
                           placeholder="Email"
                           th:value="${user.email}" required/>

                    <input type="password" name="password"
                           placeholder="Ny adgangskode"/>

                    <!-- Optional: role (readonly if needed) -->
                    <input type="text" name="role"
                           th:value="${user.role}" readonly/>

                    <button type="submit" class="primary-btn">
                        Opdater profil
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
